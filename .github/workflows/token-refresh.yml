name: Refresh Token Facebook

on:
  # Auto-refresh setiap 50 hari (sebelum long-lived token expired 60 hari)
  schedule:
    - cron: '0 0 */50 * *'
  workflow_dispatch:
    inputs:
      user_token:
        description: 'Token Pengguna (User Token) dari Graph API Explorer — kosongkan untuk auto-refresh'
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Refresh token (manual atau otomatis)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          # Dipakai saat auto-refresh (tidak ada user_token)
          FACEBOOK_LONG_TOKEN: ${{ secrets.FACEBOOK_LONG_TOKEN }}
        run: |
          USER_TOKEN="${{ github.event.inputs.user_token }}"
          if [ -n "$USER_TOKEN" ]; then
            echo "Mode: manual (user_token disediakan)"
            python get_permanent_token.py "$USER_TOKEN"
          else
            echo "Mode: auto-refresh (gunakan FACEBOOK_LONG_TOKEN)"
            python get_permanent_token.py
          fi
